<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>혜민이를 위한 선물 💝</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #ffe6eb;
        font-family: "Gaegu", cursive;
        overflow: hidden;
        text-align: center;
        touch-action: none; /* 도망가는 버튼 터치 최적화 */
        -webkit-tap-highlight-color: transparent;
      }

      .container {
        width: 90%; /* 모바일에서 사진 2장을 위해 폭을 살짝 넓힘 */
        max-width: 380px;
        background: white;
        padding: 2.5rem 1.2rem;
        border-radius: 25px;
        box-shadow: 0 10px 30px rgba(255, 100, 100, 0.1);
        position: relative;
        z-index: 10;
      }

      h1 {
        color: #ff6b81;
        font-size: 1.8rem;
        margin: 0 0 15px 0;
      }

      p {
        font-size: 1.2rem;
        color: #444;
        line-height: 1.5;
        margin-bottom: 20px;
        word-break: keep-all;
      }

      .main-img {
        width: 100%;
        max-width: 170px;
        border-radius: 15px;
        margin-bottom: 15px;
      }

      .btn-group {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin-top: 10px;
        min-height: 60px;
        position: relative;
      }

      button {
        padding: 12px 25px;
        font-size: 1.2rem;
        font-family: "Gaegu", cursive;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-yes {
        background-color: #ff6b81;
        color: white;
        font-weight: bold;
        z-index: 100;
      }

      .btn-no {
        background-color: #eee;
        color: #888;
        z-index: 50;
        position: relative;
      }

      /* 결과 화면 스타일 */
      #result {
        display: none;
        flex-direction: column;
        align-items: center;
        animation: fadeIn 0.6s ease-out;
      }

      /* 1행 2열 배치를 위한 이미지 컨테이너 */
      .gift-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 10px; /* 사진 사이 간격 */
        width: 100%;
        margin-top: 10px;
      }

      .gift-img-half {
        width: calc(50% - 5px); /* 화면의 절반씩 차지 */
        border-radius: 10px;
        border: 2px dashed #ff6b81;
        object-fit: contain;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="container" id="question-box">
      <h1>선물이 도착했습니다 💌</h1>

      <img
        src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3d21pNTI4MzlhbDc5Mjl4emVqbmVyMW12ZTJmMTA5c2VsdmRsb2FlMiZlcD12MV9naWZzX3RyZW5kaW5nJmN0PWc/qKQQUKSSbWBkO2V3KX/giphy.gif"
        alt="Cute Bear"
        class="main-img"
      />

      <p>
        <strong>혜민에게,</strong><br />
        당신을 가장 사랑하는 사람이 보낸<br />
        선물이 도착했습니다.<br /><br />
        수락하시겠습니까?
      </p>

      <div class="btn-group">
        <button class="btn-yes" onclick="acceptGift()">네, 좋아요! ❤️</button>
        <button
          class="btn-no"
          id="noBtn"
          onmouseover="moveButton()"
          ontouchstart="moveButton()"
        >
          아니요
        </button>
      </div>
    </div>

    <div class="container" id="result">
      <h1>전달 완료! 🎉</h1>
      <p style="margin-bottom: 5px">사실 이미 보냈지롱❤️</p>
      <p>맛있게 먹어요.<br />항상 고맙고 사랑해 ❤️</p>

      <div class="gift-container">
        <img src="./영수증1.png" alt="영수증1" class="gift-img-half" />
        <img src="./영수증2.png" alt="영수증2" class="gift-img-half" />
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <script>
      const noBtn = document.getElementById("noBtn");

      function moveButton() {
        noBtn.style.position = "fixed";

        // 화면 안쪽 여백을 고려한 랜덤 위치 계산
        const padding = 50;
        const maxX = window.innerWidth - noBtn.offsetWidth - padding;
        const maxY = window.innerHeight - noBtn.offsetHeight - padding;

        const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
        const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";

        const messages = ["어딜!", "안돼", "아앙", "수락해!", "귀요미양?"];
        noBtn.innerText = messages[Math.floor(Math.random() * messages.length)];
      }

      function acceptGift() {
        document.getElementById("question-box").style.display = "none";
        document.getElementById("result").style.display = "flex";

        const duration = 3000;
        const end = Date.now() + duration;

        (function frame() {
          confetti({
            particleCount: 3,
            angle: 60,
            spread: 55,
            origin: { x: 0 },
            colors: ["#ff6b81", "#ff4757"],
          });
          confetti({
            particleCount: 3,
            angle: 120,
            spread: 55,
            origin: { x: 1 },
            colors: ["#ff6b81", "#ff4757"],
          });

          if (Date.now() < end) {
            requestAnimationFrame(frame);
          }
        })();
      }
    </script>
  </body>
</html>
